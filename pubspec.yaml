name: flutter_camera_app
description: Aplikasi Flutter dengan implementasi Camera API
version: 1.0.0+1

environment:
  sdk: ">=2.17.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  url_launcher: ^6.0.0
  share_plus: ^7.2.0
  intl: ^0.19.0
  fl_chart: ^0.66.1
  image_picker: ^0.8.7+5
  firebase_core: ^2.24.0
  cloud_firestore: ^4.14.0
  firebase_auth: ^4.16.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/