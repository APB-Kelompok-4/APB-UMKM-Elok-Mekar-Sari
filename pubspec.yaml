name: flutter_camera_app
description: Aplikasi Flutter dengan implementasi Camera API
version: 1.0.0+1

environment:
  sdk: ">=2.17.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  url_launcher: ^6.0.0
  share_plus: ^13.1.0
  intl: ^0.20.2
  fl_chart: ^1.2.0
  image_picker: ^1.2.2
  firebase_core: ^4.9.0
  cloud_firestore: ^6.4.1
  firebase_auth: ^6.5.1
  js: ^0.7.2

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/icons/